<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Ledger | Blockchain & Água Potável</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #06142e;
            color: white;
            overflow-x: hidden;
        }

        /* MENU / NAVEGAÇÃO */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(6, 20, 46, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #8fd3ff;
            letter-spacing: 1px;
        }

        .menu {
            display: flex;
            gap: 25px;
        }

        .menu a {
            text-decoration: none;
            color: #d7e9ff;
            font-weight: 500;
            transition: 0.3s;
            font-size: 14px;
        }

        .menu a:hover {
            color: #1FA2FF;
        }

        .wallet {
            background: linear-gradient(90deg, #1FA2FF, #12d8fa);
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .wallet:hover {
            transform: scale(1.05);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(6, 20, 46, 0.7), rgba(6, 20, 46, 0.9)), url("fundo.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 72px);
            background: linear-gradient(90deg, #6dd5fa, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            line-height: 1.1;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 24px);
            margin-top: 15px;
            color: #d7e9ff;
            max-width: 700px;
        }
